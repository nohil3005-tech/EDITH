<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background for maskable icon support -->
  <rect width="512" height="512" fill="#0A0A0F"/>
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.15" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7C3AED" stroke-width="4" stroke-dasharray="20 10 5 10" opacity="0.3" />
  
  <!-- Definitions for gradients and glows -->
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Hexagon -->
  <polygon points="256,70 416,163 416,349 256,442 96,349 96,163" 
           fill="none" 
           stroke="url(#glowGrad)" 
           stroke-width="12" 
           filter="url(#neonGlow)" />
           
  <!-- Inner Hexagon -->
  <polygon points="256,110 380,182 380,330 256,402 132,330 132,182" 
           fill="#121224" 
           fill-opacity="0.6"
           stroke="#7C3AED" 
           stroke-width="3" 
           opacity="0.8" />
           
  <!-- Central Futuristic 'E' Emblem -->
  <g transform="translate(196, 176)" filter="url(#neonGlow)">
    <!-- Vertical bar -->
    <rect x="0" y="0" width="24" height="160" rx="6" fill="url(#glowGrad)" />
    <!-- Top arm -->
    <rect x="24" y="0" width="96" height="24" rx="6" fill="url(#glowGrad)" />
    <!-- Middle arm -->
    <rect x="24" y="68" width="80" height="24" rx="6" fill="url(#glowGrad)" />
    <!-- Bottom arm -->
    <rect x="24" y="136" width="96" height="24" rx="6" fill="url(#glowGrad)" />
  </g>
</svg>
